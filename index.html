<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הגיע הזמן לישון</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-overlay"></div>

    <main>
        <h1 class="main-title">הגיע הזמן לישון!</h1>

        <div class="tabs-container">
            <input type="radio" id="tab-original" name="gallery-tabs" checked>
            <input type="radio" id="tab-plasticine" name="gallery-tabs">
            <input type="radio" id="tab-illustration" name="gallery-tabs">

            <div class="tabs-navigation">
                <label for="tab-original" class="tab-label">מקור</label>
                <label for="tab-plasticine" class="tab-label">פלסטלינה</label>
                <label for="tab-illustration" class="tab-label">איור</label>
            </div>

            <div class="tab-content" id="content-original">
                <div class="scatter-container">
                    <div class="photo-card pos-1"><img src="images/photo1.jpg" alt="Family Photo 1"></div>
                    <div class="photo-card pos-2"><img src="images/photo2.jpg" alt="Family Photo 2"></div>
                    <div class="photo-card pos-3"><img src="images/photo3.jpg" alt="Family Photo 3"></div>
                    <div class="photo-card pos-4"><img src="images/photo4.jpg" alt="Family Photo 4"></div>
                    <div class="photo-card pos-5"><img src="images/photo5.jpg" alt="Family Photo 5"></div>
                    <div class="photo-card pos-center-bottom"><img src="images/photo6.jpg" alt="Center Bottom Photo">
                    </div>
                </div>
            </div>

            <div class="tab-content" id="content-plasticine">
                <div class="scatter-container">
                    <div class="photo-card pos-1"><img src="images/photo1_plasticine.png" alt="Plasticine Photo 1">
                    </div>
                    <div class="photo-card pos-2"><img src="images/photo2_plasticine.png" alt="Plasticine Photo 2">
                    </div>
                    <div class="photo-card pos-3"><img src="images/photo3_plasticine.png" alt="Plasticine Photo 3">
                    </div>
                    <div class="photo-card pos-4"><img src="images/photo4_plasticine.png" alt="Plasticine Photo 4">
                    </div>
                    <div class="photo-card pos-5"><img src="images/photo5_plasticine.png" alt="Plasticine Photo 5">
                    </div>
                    <div class="photo-card pos-center-bottom"><img src="images/photo6_plasticine.png"
                            alt="Plasticine Photo 6"></div>
                </div>
            </div>

            <div class="tab-content" id="content-illustration">
                <div class="scatter-container">
                    <div class="photo-card pos-1"><img src="images/photo1_illustration.png" alt="Illustration Photo 1">
                    </div>
                    <div class="photo-card pos-2"><img src="images/photo2_illustration.png" alt="Illustration Photo 2">
                    </div>
                    <div class="photo-card pos-3"><img src="images/photo3_illustration.png" alt="Illustration Photo 3">
                    </div>
                    <div class="photo-card pos-4"><img src="images/photo4_illustration.png" alt="Illustration Photo 4">
                    </div>
                    <div class="photo-card pos-5"><img src="images/photo5_illustration.png" alt="Illustration Photo 5">
                    </div>
                    <div class="photo-card pos-center-bottom"><img src="images/photo6_illustration.png"
                            alt="Illustration Photo 6"></div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
